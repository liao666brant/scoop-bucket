name: Update Scoop manifests

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: windows-latest

    steps:
      - name: Checkout bucket
        uses: actions/checkout@v4

      - name: Clone Scoop
        shell: pwsh
        run: |
          git clone https://github.com/ScoopInstaller/Scoop ../scoop

      - name: Update manifests
        shell: pwsh
        run: |
          ../scoop/bin/checkver.ps1 -Dir ./bucket -Update

      - name: Commit changes
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/*.json

          if (git diff --cached --quiet) {
            Write-Host "No manifest updates."
          } else {
            git commit -m "Update Scoop manifests"
            git push
          }
