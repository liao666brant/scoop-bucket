name: Track upstream releases and update Scoop manifests

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: windows-latest

    steps:
      - name: Checkout bucket
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show tracked upstream releases
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $targets = Get-Content .github/tracked-releases.json -Raw | ConvertFrom-Json

          foreach ($target in $targets) {
            Write-Host "Checking $($target.name) => $($target.repo)"

            $headers = @{
              "Accept" = "application/vnd.github+json"
              "Authorization" = "Bearer $env:GITHUB_TOKEN"
              "X-GitHub-Api-Version" = "2022-11-28"
            }

            $latest = Invoke-RestMethod `
              -Uri "https://api.github.com/repos/$($target.repo)/releases/latest" `
              -Headers $headers

            Write-Host "Latest release for $($target.repo): $($latest.tag_name)"
            Write-Host "Manifest: $($target.manifest)"
          }

      - name: Clone Scoop
        shell: pwsh
        run: |
          git clone https://github.com/ScoopInstaller/Scoop ../scoop

      - name: Update Scoop manifests from tracked releases
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $targets = Get-Content .github/tracked-releases.json -Raw | ConvertFrom-Json

          foreach ($target in $targets) {
            Write-Host "Updating manifest for $($target.name): $($target.manifest)"
            ../scoop/bin/checkver.ps1 $target.manifest -Update
          }

      - name: Commit changes
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/*.json .github/tracked-releases.json

          if (git diff --cached --quiet) {
            Write-Host "No upstream release updates."
          } else {
            git commit -m "Update Scoop manifests from upstream releases"
            git push
          }
